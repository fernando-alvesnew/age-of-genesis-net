services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: recruiter_api_dotnet
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - SQLSERVER_DSN=Server=db,1433;Database=${SQLSERVER_DATABASE};User ID=${SQLSERVER_USER};Password=${SQLSERVER_PASSWORD};TrustServerCertificate=True;Encrypt=False
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: recruiter_sqlserver_dotnet
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_DATABASE: ${SQLSERVER_DATABASE}
    ports:
      - "${SQLSERVER_PORT:-1433}:1433"
    healthcheck:
      test: ["CMD-SHELL", "(/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" -b -o /dev/null) || (/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" -b -o /dev/null)"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - mssql_data_dotnet:/var/opt/mssql

  db-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: recruiter_sqlserver_db_init
    depends_on:
      db:
        condition: service_healthy
    environment:
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - SQLSERVER_DATABASE=${SQLSERVER_DATABASE}
    volumes:
      - ./migrations/001_init.sql:/migrations/001_init.sql:ro
    command: >
      sh -c '
      if [ -x /opt/mssql-tools/bin/sqlcmd ]; then SQLCMD=/opt/mssql-tools/bin/sqlcmd;
      elif [ -x /opt/mssql-tools18/bin/sqlcmd ]; then SQLCMD=/opt/mssql-tools18/bin/sqlcmd;
      else SQLCMD=sqlcmd; fi;
      "$SQLCMD" -S db -U sa -P "$$MSSQL_SA_PASSWORD" -d "$$SQLSERVER_DATABASE" -i /migrations/001_init.sql -b
      '

volumes:
  mssql_data_dotnet:
